<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Window JS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button type="button" class="btn" id="openPopup">Modal JS</button>

    <div class="popup" id="popup">
        <div class="popup__content">
            <button type="button" class="popup__close" id="closePopup"><span></span></button>
            <h2 class="popup__title">Simple Modal</h2>
            <p class="popup__text">
                You can close it by clicking onthe cross or leaving the window
            </p>
        </div>
    </div>
</body>
</html>
